name: Build & Release SEEBAL Reels

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия (например: 1.2.0)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'Описание обновления (что нового)'
        required: false
        default: 'Новая версия SEEBAL Reels'

permissions:
  contents: write

jobs:
  build-windows:
    name: 🪟 Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: win-artifact
          path: dist/SEEBAL-Reels-Windows.exe

  build-mac:
    name: 🍎 macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
      - name: Упаковать .app + лаунчер в один архив
        run: |
          mkdir -p ./mac-release
          cp -R "dist/mac-universal/SEEBAL Reels.app" ./mac-release/
          cp scripts/mac-launcher.command "./mac-release/Запустить SEEBAL Reels.command"
          chmod +x "./mac-release/Запустить SEEBAL Reels.command"
          cd mac-release && zip -r "../SEEBAL-Reels-Mac.zip" . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: mac-artifact
          path: SEEBAL-Reels-Mac.zip

  release:
    name: 🚀 Создать релиз
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Скачать Windows артефакт
        uses: actions/download-artifact@v4
        with:
          name: win-artifact
          path: ./release-files

      - name: Скачать macOS артефакт
        uses: actions/download-artifact@v4
        with:
          name: mac-artifact
          path: ./release-files

      - name: Создать GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "SEEBAL Reels v${{ github.event.inputs.version }}"
          body: |
            ## 📥 Скачать

            | Платформа | Файл |
            |-----------|------|
            | 🪟 Windows | `SEEBAL-Reels-Windows.exe` — просто запусти |
            | 🍎 macOS | `SEEBAL-Reels-Mac-universal.zip` — разархивируй, перетащи в Applications |

            ---

            ## 📝 Что нового

            ${{ github.event.inputs.release_notes }}

            ---

            > **Mac:** при первом запуске правый клик → Open → Open
          files: |
            ./release-files/SEEBAL-Reels-Windows.exe
            ./release-files/SEEBAL-Reels-Mac.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
