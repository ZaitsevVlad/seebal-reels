name: Build SEEBAL Reels

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: 🪟 Windows (portable EXE)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows portable
        run: npm run dist:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SEEBAL-Reels-Windows
          path: dist/SEEBAL-Reels-Windows.exe
          retention-days: 30

  build-mac:
    name: 🍎 macOS (Universal DMG)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build macOS Universal DMG
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload macOS arm64 artifact (Apple Silicon M1/M2/M3)
        uses: actions/upload-artifact@v4
        with:
          name: SEEBAL-Reels-Mac-arm64
          path: dist/SEEBAL-Reels-Mac-arm64.zip
          retention-days: 30

      - name: Upload macOS x64 artifact (Intel)
        uses: actions/upload-artifact@v4
        with:
          name: SEEBAL-Reels-Mac-x64-Intel
          path: dist/SEEBAL-Reels-Mac-x64.zip
          retention-days: 30
