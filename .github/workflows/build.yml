name: Build & Release SEEBAL Reels

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия (например: 1.2.0)'
        required: true
        default: '1.1.0'
      release_notes:
        description: 'Описание обновления (что нового)'
        required: false
        default: 'Новая версия SEEBAL Reels'

permissions:
  contents: write

jobs:
  build-windows:
    name: 🪟 Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: win-artifact
          path: dist/SEEBAL-Reels-Windows.exe

  build-mac-arm64:
    name: 🍎 macOS Apple Silicon (M1/M2/M3)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run dist:mac:arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
      - name: Упаковать arm64 .app + лаунчер
        run: |
          mkdir -p ./mac-arm64-release
          cp -R "dist/mac-arm64/SEEBAL Reels.app" ./mac-arm64-release/
          cp scripts/mac-launcher.command "./mac-arm64-release/Запустить SEEBAL Reels.command"
          chmod +x "./mac-arm64-release/Запустить SEEBAL Reels.command"
          cd mac-arm64-release && zip -r "../SEEBAL-Reels-Mac-arm64.zip" . && cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64-artifact
          path: SEEBAL-Reels-Mac-arm64.zip

  build-mac-x64:
    name: 🍎 macOS Intel (x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run dist:mac:x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
      - name: Упаковать x64 .app + лаунчер
        run: |
          mkdir -p ./mac-x64-release
          cp -R "dist/mac/SEEBAL Reels.app" ./mac-x64-release/
          cp scripts/mac-launcher.command "./mac-x64-release/Запустить SEEBAL Reels.command"
          chmod +x "./mac-x64-release/Запустить SEEBAL Reels.command"
          cd mac-x64-release && zip -r "../SEEBAL-Reels-Mac-x64.zip" . && cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64-artifact
          path: SEEBAL-Reels-Mac-x64.zip

  release:
    name: 🚀 Создать релиз
    needs: [build-windows, build-mac-arm64, build-mac-x64]
    runs-on: ubuntu-latest
    steps:
      - name: Скачать Windows артефакт
        uses: actions/download-artifact@v4
        with:
          name: win-artifact
          path: ./release-files

      - name: Скачать macOS arm64 артефакт
        uses: actions/download-artifact@v4
        with:
          name: mac-arm64-artifact
          path: ./release-files

      - name: Скачать macOS x64 артефакт
        uses: actions/download-artifact@v4
        with:
          name: mac-x64-artifact
          path: ./release-files

      - name: Создать GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "SEEBAL Reels v${{ github.event.inputs.version }}"
          body: |
            ## 📥 Скачать

            | Платформа | Файл | Для кого |
            |-----------|------|----------|
            | 🪟 Windows | `SEEBAL-Reels-Windows.exe` | просто запусти |
            | 🍎 macOS Apple Silicon | `SEEBAL-Reels-Mac-arm64.zip` | M1, M2, M3, M4 |
            | 🍎 macOS Intel | `SEEBAL-Reels-Mac-x64.zip` | старые Mac с Intel |

            > Не знаешь какой Mac? Нажми 🍎 → «Об этом Mac» — если «Apple M...» → arm64, если «Intel» → x64

            ---

            ## 📝 Что нового

            ${{ github.event.inputs.release_notes }}

            ---

            > **Mac:** при первом запуске правый клик → Open → Open
          files: |
            ./release-files/SEEBAL-Reels-Windows.exe
            ./release-files/SEEBAL-Reels-Mac-arm64.zip
            ./release-files/SEEBAL-Reels-Mac-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
